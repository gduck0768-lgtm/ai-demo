<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>葛城美里</title>

  <style>
    body {
      font-family: Arial;
      margin: 0;
      background: #f5f5f5;
    }

    #chat {
      height: 80vh;
      overflow-y: auto;
      padding: 10px;
    }

    .msg {
      margin: 10px 0;
      display: flex;
    }

    .user { justify-content: flex-end; }
    .ai { justify-content: flex-start; }

    .bubble {
      max-width: 70%;
      padding: 10px;
      border-radius: 10px;
      word-wrap: break-word;
    }

    .user .bubble {
      background: #007bff;
      color: white;
    }

    .ai .bubble {
      background: #e0e0e0;
    }

    #inputBox {
      position: fixed;
      bottom: 0;
      width: 100%;
      display: flex;
      padding: 10px;
      background: white;
    }

    input {
      flex: 1;
      padding: 10px;
    }

    button {
      padding: 10px;
    }
  </style>
</head>

<body>

<div id="chat"></div>

<div id="inputBox">
  <input id="input" placeholder="说点什么..." />
  <button onclick="send()">发送</button>
</div>

<script>

const userId = "goose_duck_main_user";
localStorage.setItem("uid", userId);

function escapeHtml(text) {
  return text
    .replace(/&/g, "&amp;")
    .replace(/</g, "&lt;")
    .replace(/>/g, "&gt;")
    .replace(/"/g, "&quot;")
    .replace(/'/g, "&#039;");
}

function scrollToBottom() {
  const chat = document.getElementById("chat");
  chat.scrollTop = chat.scrollHeight;
}

let globalAudio = null;

const audioCache = {};

function playAudio(base64) {
  try {

    //缓存命中直接播放
    if (audioCache[base64]) {
      new Audio(audioCache[base64]).play();
      return;
    }

    const byteCharacters = atob(base64);
    const byteArray = new Uint8Array(byteCharacters.length);

    for (let i = 0; i < byteCharacters.length; i++) {
      byteArray[i] = byteCharacters.charCodeAt(i);
    }

    const blob = new Blob([byteArray], { type: "audio/mpeg" });
    const url = URL.createObjectURL(blob);

    //存缓存
    audioCache[base64] = url;

    if (globalAudio) {
      globalAudio.pause();
      globalAudio = null;
    }

    globalAudio = new Audio(url);
    globalAudio.play();

  } catch (err) {
    console.log("audio error:", err);
  }
}


const chat = document.getElementById("chat");

let offset = 0;
const limit = 20;
let loading = false;
let hasMore = true;

// =======================
// 初始化加载
// =======================
async function loadMessages() {
  if (loading || !hasMore) return;
  loading = true;

  const res = await fetch(`/messages?offset=${offset}&limit=20`);
  const data = await res.json();

  if (data.length === 0) {
    hasMore = false;
    loading = false;
    return;
  }

  const fragment = document.createDocumentFragment();

  data.forEach(msg => {
    const div = document.createElement("div");
    div.className = "msg " + (msg.role === "user" ? "user" : "ai");

    div.innerHTML = `
      <div class="bubble">${escapeHtml(msg.content)}</div>
    `;

    fragment.appendChild(div);
  });

  chat.prepend(fragment);

  //关键：offset 增长
  offset += data.length;

  loading = false;
}

// =======================
// 上滑触发加载
// =======================
chat.addEventListener("scroll", () => {
  if (chat.scrollTop < 50) {
    loadMessages();
  }
});

// =======================
// 发送消息
// =======================
async function send() {

  const input = document.getElementById("input");
  const text = input.value.trim();
  if (!text) return;

  chat.innerHTML += `
    <div class="msg ai">
        <div class="bubble">
              ${escapeHtml(data.reply || "")}
              ${data.audio ? `<button onclick="playAudio('${data.audio}')">🔊</button>` : ""}
        </div>
    </div>
  `;

  input.value = "";
  scrollToBottom();

  const res = await fetch("/chat", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ text, userId })
  });

  const data = await res.json();

  chat.innerHTML += `
    <div class="msg ai">
      <div class="bubble">${escapeHtml(data.reply || "")}</div>
    </div>
  `;

  scrollToBottom();

  if (data.audio) {
    playAudio(data.audio);
  }
}

// 首次加载
loadMessages();

</script>

</body>
</html>
