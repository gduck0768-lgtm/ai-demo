<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>葛城美里</title>

  <style>
    body {
      font-family: Arial;
      margin: 0;
      background: #f5f5f5;
    }

    #chat {
      height: 80vh;
      overflow-y: auto;
      padding: 10px;
    }

    .msg {
      margin: 10px 0;
      display: flex;
    }

    .user { justify-content: flex-end; }
    .ai { justify-content: flex-start; }

    .bubble {
      max-width: 70%;
      padding: 10px;
      border-radius: 10px;
      word-wrap: break-word;
    }

    .user .bubble {
      background: #007bff;
      color: white;
    }

    .ai .bubble {
      background: #e0e0e0;
    }

    #inputBox {
      position: fixed;
      bottom: 0;
      width: 100%;
      display: flex;
      padding: 10px;
      background: white;
    }

    input {
      flex: 1;
      padding: 10px;
    }

    button {
      padding: 10px;
    }
  </style>
</head>

<body>

<div id="chat"></div>

<div id="inputBox">
  <input id="input" placeholder="说点什么..." />
  <button onclick="send()">发送</button>
</div>

<script>

//userId
const userId = localStorage.getItem("uid") || Date.now().toString();
localStorage.setItem("uid", userId);

//防XSS
function escapeHtml(text) {
  return text
    .replace(/&/g, "&amp;")
    .replace(/</g, "&lt;")
    .replace(/>/g, "&gt;")
    .replace(/"/g, "&quot;")
    .replace(/'/g, "&#039;");
}

//自动滚动
function scrollToBottom() {
  const chat = document.getElementById("chat");
  chat.scrollTop = chat.scrollHeight;
}


let globalAudio = null;

function playAudio(base64) {
  try {
    const byteCharacters = atob(base64);
    const byteArray = new Uint8Array(byteCharacters.length);

    for (let i = 0; i < byteCharacters.length; i++) {
      byteArray[i] = byteCharacters.charCodeAt(i);
    }

    const blob = new Blob([byteArray], { type: "audio/mpeg" });
    const url = URL.createObjectURL(blob);

    if (globalAudio) {
      globalAudio.pause();
      globalAudio = null;
    }

    globalAudio = new Audio();

    //关键：先绑定 src 再 play
    globalAudio.src = url;
    globalAudio.preload = "auto";

    globalAudio.onloadedmetadata = () => {
      globalAudio.play().catch(err => {
        console.log("播放失败:", err);
      });
    };

    globalAudio.onended = () => {
      URL.revokeObjectURL(url);
      globalAudio = null;
    };

  } catch (err) {
    console.log("audio error:", err);
  }
}


async function send() {

  const input = document.getElementById("input");
  const chat = document.getElementById("chat");

  const text = input.value.trim();
  if (!text) return;

  // 用户消息
  chat.innerHTML += `
    <div class="msg user">
      <div class="bubble">${escapeHtml(text)}</div>
    </div>
  `;

  input.value = "";
  scrollToBottom();

  try {
    const res = await fetch("/chat", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({ 
	text,
	userId 
      })
    });

    const data = await res.json();

    // AI消息
    chat.innerHTML += `
      <div class="msg ai">
        <div class="bubble">${escapeHtml(data.reply || "")}</div>
      </div>
    `;

    scrollToBottom();

    // 音频播放
    if (data.audio) {
      playAudio(data.audio);
    }

  } catch (err) {
    console.error("前端错误:", err);
  }
}
</script>

</body>
</html>
