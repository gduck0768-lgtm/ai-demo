<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>葛城美里</title>

  <style>

    html {
      margin: 0;
      padding: 0;
      height: 100%;
      background: #e6f2ef;
    }

    //背景颜色
    body {
      margin: 0;
      padding: 0;
      background: #e6f2ef;
      display: flex;
      flex-direction: column;
    }

    #chat {
      flex: 1;
      width: 100%;
      height: 80vh;
      overflow-y: auto;
      padding: 10px;
      box-sizing: border-box;
    }

    .msg {
      margin: 10px 0;
      display: flex;
    }

    .user { justify-content: flex-end; }
    .ai { justify-content: flex-start; }

    .bubble {
      max-width: 70%;
      padding: 10px;
      border-radius: 10px;
      word-wrap: break-word;
    }

    .user .bubble {
      background: #007bff;
      color: white;
    }

    .ai .bubble {
      background: #e0e0e0;
    }

    .time-divider {
      display: flex;
      justify-content: center;
      margin: 14px 0;
    }

    .time-divider span {
      background: rgba(0, 0, 0, 0.25);
      color: white;
      font-size: 12px;
      padding: 3px 10px;
      border-radius: 10px;
    }

    #inputBox {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      width: 100%;
      display: flex;
      gap: 8px;
      padding: 10px;
      background: #f2f2f2;   /* 👈 浅灰色 */
      box-sizing: border-box;
    }


    input {
      flex: 1;
        padding: 10px;
        border: none;
        border-radius: 8px;
        outline: none;
    }

    button {
      padding: 10px 16px;
        border: none;
        border-radius: 8px;
        background: #007bff;
        color: white;
    }


  </style>
</head>

<body>

<div id="chat"></div>

<div id="inputBox">
  <input id="input" placeholder="说点什么..." />
  <button onclick="send()">发送</button>
</div>

<script>

const API_BASE = window.location.origin;
const userId = "goose_duck_main_user";
localStorage.setItem("uid", userId);

function escapeHtml(text) {
  return text
    .replace(/&/g, "&amp;")
    .replace(/</g, "&lt;")
    .replace(/>/g, "&gt;")
    .replace(/"/g, "&quot;")
    .replace(/'/g, "&#039;");
}

function scrollToBottom() {
  const chat = document.getElementById("chat");
  chat.scrollTop = chat.scrollHeight;
}

let globalAudio = null;

const audioCache = {};

function playAudio(base64) {
  try {

    //缓存命中直接播放
    if (audioCache[base64]) {
      new Audio(audioCache[base64]).play();
      return;
    }

    const byteCharacters = atob(base64);
    const byteArray = new Uint8Array(byteCharacters.length);

    for (let i = 0; i < byteCharacters.length; i++) {
      byteArray[i] = byteCharacters.charCodeAt(i);
    }

    const blob = new Blob([byteArray], { type: "audio/mpeg" });
    const url = URL.createObjectURL(blob);

    //存缓存
    audioCache[base64] = url;

    if (globalAudio) {
      globalAudio.pause();
      globalAudio = null;
    }

    globalAudio = new Audio(url);
    globalAudio.play();

  } catch (err) {
    console.log("audio error:", err);
  }
}


//===== 时间判断函数 =====
function formatChatTime(current, previous) {
  const cur = new Date(current);
  const prev = previous ? new Date(previous) : null;

  if (!prev) return null;

  const diffMin = (cur - prev) / 1000 / 60;

  const sameDay =
    cur.getFullYear() === prev.getFullYear() &&
    cur.getMonth() === prev.getMonth() &&
    cur.getDate() === prev.getDate();

  if (diffMin <= 10) return null;

  const hh = String(cur.getHours()).padStart(2, '0');
  const mm = String(cur.getMinutes()).padStart(2, '0');

  if (!sameDay) {
    const y = cur.getFullYear();
    const m = String(cur.getMonth() + 1).padStart(2, '0');
    const d = String(cur.getDate()).padStart(2, '0');

    return `${y}-${m}-${d}-${hh}:${mm}`;
  }

  return `${hh}:${mm}`;
}



const chat = document.getElementById("chat");

let offset = 0;
const limit = 20;
let loading = false;
let hasMore = true;

// =======================
// 初始化加载
// =======================
async function loadMessages() {
  if (loading || !hasMore) return;
  loading = true;

  const res = await fetch(`${API_BASE}/messages?userId=${userId}&offset=${offset}&limit=20`)
  const data = await res.json();

  if (data.length === 0) {
    hasMore = false;
    loading = false;
    return;
  }

  const fragment = document.createDocumentFragment();

  data.reverse().forEach((msg, index) => {

  const prev = data[index + 1]; // 注意 reverse 后顺序

  const timeLabel = formatChatTime(msg.timestamp, prev?.timestamp);

  if (timeLabel) {
    const timeDiv = document.createElement("div");
    timeDiv.className = "time-divider";
    timeDiv.innerHTML = `<span>${timeLabel}</span>`;
    fragment.appendChild(timeDiv);
  }

  const div = document.createElement("div");
  div.className = "msg " + (msg.role === "user" ? "user" : "ai");

  div.innerHTML = `
    <div class="bubble">
      ${escapeHtml(msg.content)}
      ${msg.audio ? `<button onclick="playAudio('${msg.audio}')">🔊</button>` : ""}
    </div>
  `;

  fragment.appendChild(div);
});

  chat.prepend(fragment);

  //关键：offset 增长
  offset += data.length;

  loading = false;
}

// =======================
// 上滑触发加载
// =======================
chat.addEventListener("scroll", () => {
  if (chat.scrollTop < 50) {
    loadMessages();
  }
});

// =======================
// 发送消息
// =======================
async function send() {

  const input = document.getElementById("input");
  const text = input.value.trim();
  if (!text) return;

  // 用户消息
  const now = new Date().toISOString();

  const lastMsgEl = [...chat.querySelectorAll(".msg")].pop();
  const lastTime = lastMsgEl?.dataset?.time;

  const timeLabel = formatChatTime(now, lastTime);

  if (timeLabel) {
    chat.innerHTML += `
      <div class="time-divider"><span>${timeLabel}</span></div>
    `;
  }

  //渲染用户消息
  chat.innerHTML += `
    <div class="msg user" data-time="${now}">
      <div class="bubble">${escapeHtml(text)}</div>
    </div>
  `;

  input.value = "";
  scrollToBottom();

  try {
    const res = await fetch(`${API_BASE}/chat`, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ text, userId })
    });

    const data = await res.json();

    // AI消息
    const nowAI = new Date().toISOString();

    const lastMsgEl = [...chat.querySelectorAll(".msg")].pop();
    const lastTime = lastMsgEl?.dataset?.time;

    const timeLabel = formatChatTime(nowAI, lastTime);

    if (timeLabel) {
      chat.innerHTML += `
        <div class="time-divider"><span>${timeLabel}</span></div>
      `;
    }

    // 渲染AI消息
    chat.innerHTML += `
      <div class="msg ai" data-time="${nowAI}">
        <div class="bubble">
          ${escapeHtml(data.reply || "")}
          ${data.audio ? `<button onclick="playAudio('${data.audio}')">🔊</button>` : ""}
        </div>
      </div>
    `;

    scrollToBottom();

    if (data.audio) {
      playAudio(data.audio);
    }

  } catch (err) {
    console.error("发送失败:", err);
  }
}


// 首次加载
loadMessages();

</script>

</body>
</html>
